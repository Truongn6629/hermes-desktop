name: Sync upstream submodules

on:
  schedule:
    # ~15-minute cadence on off-peak minutes (XX:07, :22, :37, :52). GitHub
    # Actions schedule events are best-effort and routinely delayed 15-60 min
    # under load; pretending we'll get :05 granularity just produces silently
    # dropped runs. A desktop wrapper waiting half an hour for an upstream
    # release to land is fine — set expectations accordingly.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules (PAT so subsequent push triggers workflows)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python (for hermes-agent sanity check)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Detect upstream releases ────────────────────────────────────────
      # Two sources: npm (hermes-web-ui) and PyPI (hermes-agent). We bump if
      # EITHER has a newer published version than what we're pinned to.

      - name: Detect new hermes-web-ui release on npm
        id: webui
        run: |
          set -e
          CUR=$(jq -r .version vendor/hermes-web-ui/package.json)
          NPM=$(curl -fsSL https://registry.npmjs.org/hermes-web-ui/latest | jq -r .version)
          if [ -z "$NPM" ] || [ "$NPM" = "null" ]; then
            echo "✗ Failed to read latest hermes-web-ui from npm" >&2
            exit 1
          fi
          echo "vendored: $CUR   npm latest: $NPM"
          if [ "$CUR" = "$NPM" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="v${NPM}"
          cd vendor/hermes-web-ui
          git fetch origin --tags --quiet
          if ! NEW_SHA=$(git rev-parse "refs/tags/${TAG}^{commit}" 2>/dev/null); then
            echo "✗ npm published $NPM but git tag $TAG not found upstream — skipping" >&2
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OLD_SHA=$(git rev-parse HEAD)
          COUNT=$(git rev-list --count "$OLD_SHA..$NEW_SHA" 2>/dev/null || echo "?")
          echo "↑ hermes-web-ui v$CUR → v$NPM ($COUNT commits)"
          echo "changed=true"    >> "$GITHUB_OUTPUT"
          echo "old_sha=$OLD_SHA" >> "$GITHUB_OUTPUT"
          echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "old_ver=$CUR" >> "$GITHUB_OUTPUT"
          echo "new_ver=$NPM" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"

      - name: Detect new hermes-agent release on PyPI
        id: agent
        run: |
          set -e
          CUR=$(grep -oE "HERMES_VERSION = process.env.HERMES_VERSION \|\| '[0-9.]+'" scripts/install-hermes.mjs | grep -oE "'[0-9.]+'" | tr -d "'")
          PYPI=$(curl -fsSL https://pypi.org/pypi/hermes-agent/json | jq -r .info.version)
          if [ -z "$PYPI" ] || [ "$PYPI" = "null" ]; then
            echo "✗ Failed to read latest hermes-agent from PyPI" >&2
            exit 1
          fi
          echo "pinned: $CUR   PyPI latest: $PYPI"
          if [ "$CUR" = "$PYPI" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "↑ hermes-agent v$CUR → v$PYPI"
          echo "changed=true"   >> "$GITHUB_OUTPUT"
          echo "old_ver=$CUR"   >> "$GITHUB_OUTPUT"
          echo "new_ver=$PYPI"  >> "$GITHUB_OUTPUT"

      - name: Aggregate change flag
        id: diff
        run: |
          if [ "${{ steps.webui.outputs.changed }}" = "true" ] || [ "${{ steps.agent.outputs.changed }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "✓ Everything already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if a sync PR is already open
        if: steps.diff.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh pr list --repo "$GITHUB_REPOSITORY" --label "auto-sync" --state open --json number --jq 'length')
          if [ "$OPEN" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next desktop version
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        id: version
        run: |
          CUR=$(jq -r .version package.json)
          NEXT=$(echo "$CUR" | awk -F. '{print $1"."$2"."$3+1}')
          echo "current=$CUR" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT"   >> "$GITHUB_OUTPUT"

      # ── Sanity-check each set of patches (idempotent: anchor-based) ─────

      - name: Sanity-check hermes-web-ui patches
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true' && steps.webui.outputs.changed == 'true'
        id: webui-patch
        continue-on-error: true
        run: |
          set -e
          cd vendor/hermes-web-ui
          git checkout "${{ steps.webui.outputs.new_sha }}"
          npm ci --no-audit --no-fund
          npm run build
          npm prune --omit=dev
          cd ../..
          if node scripts/apply-webui-patches.mjs 2>&1 | tee /tmp/webui-patch.log; then
            if grep -q "anchor not found" /tmp/webui-patch.log; then
              echo "ok=false" >> "$GITHUB_OUTPUT"
            else
              echo "ok=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
          cd vendor/hermes-web-ui
          git reset --hard "${{ steps.webui.outputs.new_sha }}"

      - name: Sanity-check hermes-agent patches
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true' && steps.agent.outputs.changed == 'true'
        id: agent-patch
        continue-on-error: true
        env:
          NEW_AGENT_VER: ${{ steps.agent.outputs.new_ver }}
        run: |
          set -e
          python -m pip install --quiet --upgrade pip uv
          mkdir -p /tmp/hermes-agent-check
          uv pip install --target /tmp/hermes-agent-check "hermes-agent==${NEW_AGENT_VER}" --quiet
          if HERMES_AGENT_SITE_PACKAGES=/tmp/hermes-agent-check node scripts/apply-hermes-patches.mjs 2>&1 | tee /tmp/agent-patch.log; then
            if grep -q "anchor not found" /tmp/agent-patch.log; then
              echo "ok=false" >> "$GITHUB_OUTPUT"
            else
              echo "ok=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Aggregate patch sanity result
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        id: patch-check
        run: |
          # A change-source's patches are OK if either it didn't change or its
          # sanity check returned ok=true. Both must be OK for fast-path.
          WEBUI_OK="true"
          AGENT_OK="true"
          if [ "${{ steps.webui.outputs.changed }}" = "true" ] && [ "${{ steps.webui-patch.outputs.ok }}" != "true" ]; then
            WEBUI_OK="false"
          fi
          if [ "${{ steps.agent.outputs.changed }}" = "true" ] && [ "${{ steps.agent-patch.outputs.ok }}" != "true" ]; then
            AGENT_OK="false"
          fi
          if [ "$WEBUI_OK" = "true" ] && [ "$AGENT_OK" = "true" ]; then
            echo "patches_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "patches_ok=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Web UI patches: $WEBUI_OK   |   Agent patches: $AGENT_OK"

      # ── Stage the bumps in the working tree ─────────────────────────────

      - name: Update submodule pointer / agent pin / desktop version / lockfile
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        run: |
          if [ "${{ steps.webui.outputs.changed }}" = "true" ]; then
            git -C vendor/hermes-web-ui checkout "${{ steps.webui.outputs.new_sha }}"
          fi
          if [ "${{ steps.agent.outputs.changed }}" = "true" ]; then
            # Replace the default-pinned version in install-hermes.mjs.
            sed -i -E "s/(HERMES_VERSION = process\.env\.HERMES_VERSION \|\| ')[0-9.]+(')/\1${{ steps.agent.outputs.new_ver }}\2/" scripts/install-hermes.mjs
          fi
          jq --arg v "${{ steps.version.outputs.next }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          npm install --package-lock-only --no-audit --no-fund || true

      # ── Push paths ──────────────────────────────────────────────────────

      - name: Push to main + tag (fast path, patches OK)
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true' && steps.patch-check.outputs.patches_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          OLD_VER: ${{ steps.version.outputs.current }}
          NEW_VER: ${{ steps.version.outputs.next }}
          # web-ui (may be empty when unchanged)
          WEBUI_CHANGED: ${{ steps.webui.outputs.changed }}
          WEBUI_OLD_VER: ${{ steps.webui.outputs.old_ver }}
          WEBUI_NEW_VER: ${{ steps.webui.outputs.new_ver }}
          WEBUI_OLD_SHA: ${{ steps.webui.outputs.old_sha }}
          WEBUI_NEW_SHA: ${{ steps.webui.outputs.new_sha }}
          WEBUI_TAG: ${{ steps.webui.outputs.tag }}
          WEBUI_COMMIT_COUNT: ${{ steps.webui.outputs.commit_count }}
          # hermes-agent (may be empty when unchanged)
          AGENT_CHANGED: ${{ steps.agent.outputs.changed }}
          AGENT_OLD_VER: ${{ steps.agent.outputs.old_ver }}
          AGENT_NEW_VER: ${{ steps.agent.outputs.new_ver }}
        run: bash .github/scripts/push-to-main.sh

      - name: Open needs-review PR (slow path, patches broken)
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true' && steps.patch-check.outputs.patches_ok != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD_VER: ${{ steps.version.outputs.current }}
          NEW_VER: ${{ steps.version.outputs.next }}
          PATCHES_OK: ${{ steps.patch-check.outputs.patches_ok }}
          WEBUI_CHANGED: ${{ steps.webui.outputs.changed }}
          WEBUI_OLD_VER: ${{ steps.webui.outputs.old_ver }}
          WEBUI_NEW_VER: ${{ steps.webui.outputs.new_ver }}
          WEBUI_OLD_SHA: ${{ steps.webui.outputs.old_sha }}
          WEBUI_NEW_SHA: ${{ steps.webui.outputs.new_sha }}
          WEBUI_TAG: ${{ steps.webui.outputs.tag }}
          WEBUI_COMMIT_COUNT: ${{ steps.webui.outputs.commit_count }}
          WEBUI_PATCH_OK: ${{ steps.webui-patch.outputs.ok }}
          AGENT_CHANGED: ${{ steps.agent.outputs.changed }}
          AGENT_OLD_VER: ${{ steps.agent.outputs.old_ver }}
          AGENT_NEW_VER: ${{ steps.agent.outputs.new_ver }}
          AGENT_PATCH_OK: ${{ steps.agent-patch.outputs.ok }}
        run: bash .github/scripts/open-sync-pr.sh
